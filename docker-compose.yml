services:
  web:
    build: .
    container_name: sdilej-search
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_DB_PATH=/config/app.db
      - DOWNLOAD_DIR=/media
    volumes:
      - ${SDILEJ_CONFIG_DIR:-./data}:/config
      - ${SDILEJ_MEDIA_DIR:-./downloads}:/media
